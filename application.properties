# =============================================
# SAHAYAK-DRISHTI — APPLICATION CONFIGURATION
# =============================================

spring.application.name=Sahayak-Drishti

# -----------------------------------------------
# SERVER CONFIG
# -----------------------------------------------
server.port=8080
server.servlet.context-path=/

# -----------------------------------------------
# H2 IN-MEMORY DATABASE (Development)
# Swap this block with MySQL section for production
# -----------------------------------------------
spring.datasource.url=jdbc:h2:mem:sahayakdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------
# MYSQL (Production — uncomment and fill values)
# -----------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/sahayakdb?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=YOUR_PASSWORD

# -----------------------------------------------
# JPA / HIBERNATE
# -----------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# For MySQL use: org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# For production use: validate or update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# -----------------------------------------------
# SQL INITIALIZATION (seed data.sql on startup)
# -----------------------------------------------
spring.sql.init.mode=always

# -----------------------------------------------
# LOGGING
# -----------------------------------------------
logging.level.com.innovix.sahayak=DEBUG
logging.level.org.springframework.security=INFO

# -----------------------------------------------
# ADMIN CREDENTIALS (Change before production!)
# -----------------------------------------------
sahayak.admin.username=admin
sahayak.admin.password=Innovix@2026

# -----------------------------------------------
# QR CODE CONFIG
# -----------------------------------------------
sahayak.qr.base-url=http://localhost:8080
sahayak.qr.size=300

# -----------------------------------------------
# FILE UPLOAD (for future bulk import)
# -----------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
